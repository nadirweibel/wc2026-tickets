<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FIFA World Cup 2026 — Ticket Tracker</title>
  <style>
    :root {
      --bg:     #08101f;
      --card:   #0f1c33;
      --card2:  #0d1a2e;
      --border: #1c2e4a;
      --text:   #e4ecf7;
      --muted:  #7a93b5;
      --accent: #1a6fbe;
      --green:  #22c55e;
      --yellow: #ffd700;
      --orange: #f97316;
      --red:    #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* ── auth overlay ── */
    #auth-overlay {
      position: fixed; inset: 0; background: rgba(8,16,31,0.97);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; backdrop-filter: blur(6px);
    }
    .auth-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px 48px; text-align: center; max-width: 380px; width: 90%;
    }
    .auth-box h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 6px; }
    .auth-box p  { font-size: 0.8rem; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
    .auth-input {
      width: 100%; background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 10px 14px;
      font-size: 1rem; outline: none; margin-bottom: 12px; text-align: center; letter-spacing: 2px;
    }
    .auth-input:focus { border-color: var(--accent); }
    .auth-btn {
      width: 100%; background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: 11px; font-size: 0.9rem; font-weight: 700; cursor: pointer;
    }
    .auth-btn:hover { background: #1d7fd4; }
    .auth-error { font-size: 0.75rem; color: var(--red); min-height: 18px; margin-top: 4px; }

    /* ── header ── */
    header {
      background: linear-gradient(135deg, #002b6b 0%, #001435 100%);
      padding: 18px 28px 16px;
      border-bottom: 2px solid #1a6fbe;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    header h1 { font-size: 1.35rem; font-weight: 800; letter-spacing: -0.3px; }
    header h1 span { color: var(--yellow); }
    .meta { font-size: 0.74rem; color: #7aaef8; margin-top: 3px; }
    .header-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .ceiling-control {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 12px;
    }
    .ceiling-control label { font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
    .ceiling-input {
      background: transparent; border: none; border-bottom: 1px solid var(--accent);
      color: var(--yellow); font-size: 0.95rem; font-weight: 700; width: 58px;
      text-align: right; outline: none; padding: 0 2px;
    }
    .refresh-btn {
      background: rgba(26,111,190,0.25); border: 1px solid var(--accent);
      color: #7aaef8; border-radius: 6px; padding: 6px 14px; font-size: 0.78rem; cursor: pointer;
    }
    .refresh-btn:hover { background: var(--accent); color: #fff; }

    /* ── summary + filter bar (one combined line) ── */
    .summary { display: flex; gap: 0; padding: 12px 28px; align-items: center; }
    .summary-group { display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .summary-group.active-filter { background: rgba(250,204,21,0.05); border-radius: 12px; padding: 8px 10px; margin: -8px -10px; }
    .summary-group-label {
      font-size: 0.62rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--muted); padding: 0 2px;
      cursor: pointer; transition: color 0.15s; display: inline-block;
    }
    .summary-group-label:hover { color: #fff; }
    .summary-group.active-filter .summary-group-label { color: var(--yellow); }
    .summary-group-right { align-items: flex-end; }
    .summary-group-right .summary-cards { justify-content: flex-end; }
    .summary-cards { display: flex; gap: 8px; flex-wrap: wrap; }
    .summary-center {
      display: flex; flex-direction: row; gap: 6px;
      align-items: center; flex-shrink: 0; padding: 0 18px;
    }
    .scard {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 16px; min-width: 86px; transition: border-color 0.15s, background 0.15s;
    }
    .scard-btn { cursor: pointer; }
    .scard-btn:hover { border-color: rgba(250,204,21,0.5); background: rgba(250,204,21,0.06); }
    .scard-active { border-color: rgba(250,204,21,0.75) !important; background: rgba(250,204,21,0.12) !important; }
    .summary-group.active-filter .scard { border-color: rgba(250,204,21,0.25); }
    .scard .num { font-size: 1.5rem; font-weight: 800; color: var(--yellow); }
    .scard .lbl { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
    /* quantity chip next to price */
    .qty-chip {
      display: inline-block; font-size: 0.65rem; font-weight: 700;
      background: rgba(122,147,181,0.18); color: var(--muted);
      border: 1px solid rgba(122,147,181,0.25);
      border-radius: 4px; padding: 1px 6px; margin-left: 5px;
      vertical-align: middle; white-space: nowrap;
    }

    /* ── game tabs ── */
    .game-tabs {
      display: flex; flex-direction: column; gap: 8px; padding: 8px 28px 10px;
      border-bottom: 1px solid var(--border);
    }
    .tab-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: flex-start; }
    /* Split tab row: swiss left | spacer | sofi right — aligns under summary bar */
    .tab-split { display: flex; gap: 0; align-items: flex-start; }
    .tab-split-swiss { flex: 1; display: flex; flex-wrap: wrap; gap: 6px; }
    .tab-split-gap   { flex-shrink: 0; padding: 0 18px; }
    .tab-split-sofi  { flex: 1; display: flex; flex-wrap: nowrap; gap: 6px; justify-content: flex-end; }
    .tab-split-sofi .gtab { min-width: 0; padding: 8px 7px; }
    .gtab {
      background: var(--card); border: 1px solid var(--border); color: var(--muted);
      border-radius: 10px; padding: 8px 12px; font-size: 0.72rem; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 1px;
      min-width: 90px; transition: background 0.15s;
    }
    .gtab:hover { background: rgba(26,111,190,0.2); border-color: var(--accent); }
    .gtab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .gtab .tab-flags { font-size: 1.05rem; line-height: 1; }
    .gtab .tab-teams { font-weight: 700; color: inherit; font-size: 0.71rem; text-align: center; line-height: 1.2; }
    .gtab .tab-date  { font-size: 0.64rem; color: var(--muted); }
    .gtab.active .tab-date { color: rgba(255,255,255,0.65); }
    .gtab.active .tab-teams { color: #fff; }
    /* filter tabs (Switzerland / SoFi) get a tinted accent */
    .filter-tab { border-color: rgba(255,215,0,0.2); }
    .filter-tab:hover { border-color: rgba(255,215,0,0.4); background: rgba(255,215,0,0.06); }
    .filter-tab.active { background: rgba(255,215,0,0.14); border-color: rgba(255,215,0,0.55); color: var(--yellow); }
    .filter-tab.active .tab-date { color: rgba(255,215,0,0.7); }
    /* separator between filter group and game tabs */
    .tab-sep { width: 1px; background: var(--border); flex-shrink: 0; margin: 6px 2px; align-self: stretch; }

    /* ── game panels ── */
    #game-panels { flex: 1; min-height: 0; overflow-y: auto; padding: 20px 28px 60px; }
    .game-panel { display: none; }
    .game-panel.active { display: block; }

    .game-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden; margin-bottom: 24px;
    }
    .game-card-header {
      background: linear-gradient(135deg, #001a40 0%, #002b6b 100%);
      padding: 18px 24px; display: flex; align-items: center; gap: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .game-flags { font-size: 2.2rem; line-height: 1; letter-spacing: -2px; }
    .game-info h2 { font-size: 1.2rem; font-weight: 800; }
    .game-badge {
      display: inline-block; font-size: 0.62rem; font-weight: 700; padding: 2px 7px;
      border-radius: 4px; background: rgba(255,215,0,0.15); color: var(--yellow);
      letter-spacing: 0.5px; margin-right: 6px; vertical-align: middle;
    }
    .game-meta { font-size: 0.75rem; color: rgba(255,255,255,0.55); margin-top: 5px; line-height: 1.5; }

    /* ── platform rows ── */
    .platform-section { padding: 6px 0; }
    .platform-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 24px; border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .platform-row:last-child { border-bottom: none; }
    .platform-row:hover { background: rgba(26,111,190,0.06); }
    .plat-logo {
      width: 22px; height: 22px; border-radius: 5px; object-fit: contain;
      background: rgba(255,255,255,0.06); flex-shrink: 0;
    }
    .plat-name { font-size: 0.78rem; font-weight: 600; color: var(--text); min-width: 96px; }
    .plat-price-wrap { flex: 1; }
    .plat-price { font-size: 1.05rem; font-weight: 700; }
    .plat-price.monitoring { font-size: 0.75rem; color: var(--muted); font-style: italic; font-weight: 400; }
    .sg-check-link {
      font-size: 0.78rem; font-weight: 700; color: #4CAF50;
      background: rgba(76,175,80,0.12); border: 1px solid rgba(76,175,80,0.3);
      border-radius: 6px; padding: 4px 10px; text-decoration: none; white-space: nowrap;
    }
    .sg-check-link:hover { background: rgba(76,175,80,0.22); }
    .plat-note { font-size: 0.65rem; color: var(--muted); margin-top: 1px; }
    .plat-count {
      font-size: 0.72rem; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 2px 9px; white-space: nowrap; flex-shrink: 0; color: var(--muted);
    }
    .plat-tags { display: flex; gap: 4px; flex-shrink: 0; }
    .tag-low  { display:inline-block; padding:1px 5px; border-radius:3px; font-size:0.6rem; font-weight:800; background:rgba(34,197,94,0.18); color:var(--green); }
    .tag-deal { display:inline-block; padding:1px 5px; border-radius:3px; font-size:0.6rem; font-weight:800; background:rgba(255,215,0,0.15); color:var(--yellow); }
    .buy {
      display: inline-block; padding: 5px 12px; background: var(--accent);
      color: #fff; border-radius: 6px; text-decoration: none; font-size: 0.72rem;
      font-weight: 600; white-space: nowrap; flex-shrink: 0;
    }
    .buy:hover { background: #1d7fd4; }

    /* ── reddit section ── */
    .reddit-section { border-top: 1px solid var(--border); padding: 14px 24px 18px; }
    .reddit-section h3 {
      font-size: 0.7rem; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.6px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }
    .reddit-section h3 img { width: 14px; height: 14px; border-radius: 3px; }
    .reddit-empty { font-size: 0.75rem; color: var(--muted); font-style: italic; }
    .reddit-post {
      background: rgba(249,115,22,0.06); border: 1px solid rgba(249,115,22,0.2);
      border-radius: 9px; padding: 11px 14px; margin-bottom: 8px;
    }
    .reddit-post.dismissed { opacity: 0.3; }
    .reddit-post-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
    .reddit-post-title { font-weight: 600; font-size: 0.82rem; line-height: 1.35; flex: 1; }
    .reddit-post-meta { font-size: 0.68rem; color: var(--muted); margin-bottom: 5px; display: flex; gap: 10px; flex-wrap: wrap; }
    .reddit-post-body { font-size: 0.76rem; color: rgba(228,236,247,0.75); line-height: 1.45; }
    .reddit-price { font-weight: 700; color: var(--yellow); font-size: 0.85rem; }
    .av-badge {
      display: inline-block; padding: 1px 5px; border-radius: 3px;
      font-size: 0.6rem; font-weight: 800; vertical-align: middle;
    }
    .av-sold      { background: rgba(248,113,113,0.18); color: var(--red); }
    .av-available { background: rgba(34,197,94,0.18);   color: var(--green); }
    .av-uncertain { background: rgba(122,147,181,0.18); color: var(--muted); }
    .dismiss-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 0.85rem; padding: 0 4px; opacity: 0.45; flex-shrink: 0;
    }
    .dismiss-btn:hover { color: var(--red); opacity: 1; }

    /* ── SeatGeek manual price entry ── */
    .sg-entry-wrap { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .sg-enter-btn {
      font-size: 0.72rem; color: var(--accent); background: none;
      border: 1px solid var(--accent); border-radius: 6px; padding: 3px 10px;
      cursor: pointer; white-space: nowrap;
    }
    .sg-enter-btn:hover { background: rgba(26,111,190,0.18); }
    .sg-open-link { font-size: 0.68rem; color: var(--muted); text-decoration: none; }
    .sg-open-link:hover { color: var(--accent); }
    .sg-entry-form { display: flex; align-items: center; gap: 4px; }
    .sg-price-input {
      background: rgba(255,255,255,0.06); border: 1px solid var(--accent);
      color: var(--text); border-radius: 6px; padding: 4px 8px;
      font-size: 0.9rem; width: 72px; outline: none; text-align: center;
    }
    .sg-save-btn {
      background: var(--accent); color: #fff; border: none; border-radius: 6px;
      padding: 4px 10px; font-size: 0.72rem; cursor: pointer; font-weight: 600;
    }
    .sg-save-btn:hover { background: #1d7fd4; }
    .sg-cancel-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 0.72rem; padding: 4px 6px;
    }

    /* ── filter result header ── */
    .filter-header {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0 14px; border-bottom: 1px solid var(--border); margin-bottom: 18px;
    }
    .filter-header-label {
      font-size: 0.78rem; color: var(--yellow); font-weight: 700;
    }
    .filter-header-sub {
      font-size: 0.72rem; color: var(--muted);
    }
    .filter-header-clear {
      margin-left: auto; font-size: 0.7rem; color: var(--muted);
      background: none; border: 1px solid var(--border); border-radius: 6px;
      padding: 3px 10px; cursor: pointer; transition: color 0.15s, border-color 0.15s;
    }
    .filter-header-clear:hover { color: #fff; border-color: #fff; }

    /* ── no-listings placeholder ── */
    .no-data { font-size: 0.8rem; color: var(--muted); padding: 14px 24px; font-style: italic; }

    /* ── spinner / error ── */
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.75s linear infinite; margin: 60px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { text-align: center; padding: 60px; color: var(--red); }

    @media (max-width: 640px) {
      header, .summary, .game-tabs, #game-panels { padding-left: 14px; padding-right: 14px; }
      .game-flags { font-size: 1.6rem; }
      .platform-row { flex-wrap: wrap; gap: 8px; }
      .plat-count { text-align: left; }
    }
  </style>
</head>
<body>

<!-- ── Auth overlay ── -->
<div id="auth-overlay">
  <div class="auth-box">
    <div style="font-size:2.8rem;margin-bottom:14px">🏆⚽🇨🇭</div>
    <h2>FIFA WC 2026 Ticket Tracker</h2>
    <p>Private dashboard — enter password to continue</p>
    <form id="auth-form">
      <input id="auth-input" class="auth-input" type="password" placeholder="Password" autocomplete="current-password">
      <button type="submit" class="auth-btn">Enter →</button>
    </form>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ── Header ── -->
<header>
  <div class="header-left">
    <div style="font-size:2.4rem;line-height:1">🏆</div>
    <div>
      <h1>FIFA World Cup 2026 <span>Ticket Tracker</span></h1>
      <div class="meta" id="meta">Loading…</div>
    </div>
    <div style="font-size:2rem;line-height:1;opacity:0.85">🇨🇭</div>
  </div>
  <div class="header-controls">
    <div class="ceiling-control">
      <label for="ceilingInput">Alert ceiling</label>
      <span style="color:var(--muted);font-size:0.85rem">$</span>
      <input id="ceilingInput" class="ceiling-input" type="number" min="0" max="9999" step="25">
      <span style="font-size:0.62rem;color:var(--muted)">server-side</span>
    </div>
    <button class="refresh-btn" onclick="load()">↻ Refresh</button>
    <button class="refresh-btn" id="run-btn" onclick="triggerScrape()" style="background:rgba(34,197,94,0.15);border-color:var(--green);color:var(--green)">▶ Run now</button>
  </div>
</header>

<!-- ── Summary ── -->
<div class="summary" id="summary"></div>

<!-- ── Game tabs ── -->
<div class="game-tabs" id="gameTabs"></div>

<!-- ── Spinner / panels ── -->
<div id="game-panels">
  <div class="spinner" id="spinner"></div>
</div>

<script>
// ── Auth ──────────────────────────────────────────────────────────────────────
const SITE_PW = 'Emmin@2007';
const LS_AUTH = 'wc2026_auth_v1';
function isAuthed() { return localStorage.getItem(LS_AUTH) === SITE_PW; }
document.getElementById('auth-form').addEventListener('submit', e => {
  e.preventDefault();
  const pw = document.getElementById('auth-input').value;
  if (pw === SITE_PW) {
    localStorage.setItem(LS_AUTH, SITE_PW);
    document.getElementById('auth-overlay').style.display = 'none';
    load();
  } else {
    document.getElementById('auth-error').textContent = 'Wrong password — try again.';
    document.getElementById('auth-input').value = '';
    document.getElementById('auth-input').focus();
  }
});

// ── Ceiling ───────────────────────────────────────────────────────────────────
const LS_CEILING = 'wc2026_ceiling';
function getCeiling() { return parseFloat(localStorage.getItem(LS_CEILING) || '300'); }
function setCeiling(v) { localStorage.setItem(LS_CEILING, v); }
const ceilingInput = document.getElementById('ceilingInput');
ceilingInput.value = getCeiling();
ceilingInput.addEventListener('input', () => {
  const v = parseFloat(ceilingInput.value);
  if (!isNaN(v) && v >= 0) { setCeiling(v); renderAll(); }
});

// ── Dismiss ───────────────────────────────────────────────────────────────────
const LS_DISMISSED = 'wc2026_dismissed';
function getDismissed() {
  try { return new Set(JSON.parse(localStorage.getItem(LS_DISMISSED) || '[]')); }
  catch { return new Set(); }
}
function dismiss(key) {
  const s = getDismissed(); s.add(key);
  localStorage.setItem(LS_DISMISSED, JSON.stringify([...s]));
  renderAll();
}

// ── Game definitions ──────────────────────────────────────────────────────────
const GAMES = [
  { id:'m4',  num:4,  teams:'USA vs Paraguay',      flags:'🇺🇸🇵🇾', date:'2026-06-12', time:'6:00 PM PT', venue:'SoFi Stadium',    city:'Inglewood, CA',  group:'Group D',      sofi:true,  swiss:false, pats:['paraguay','match 4'] },
  { id:'m8',  num:8,  teams:'Qatar vs Switzerland', flags:'🇶🇦🇨🇭', date:'2026-06-13', time:'12:00 PM PT',venue:"Levi's Stadium",  city:'Santa Clara, CA', group:'Group B',      sofi:false, swiss:true,  pats:['qatar','match 8'] },
  { id:'m15', num:15, teams:'Iran vs New Zealand',  flags:'🇮🇷🇳🇿', date:'2026-06-15', time:'3:00 PM PT', venue:'SoFi Stadium',    city:'Inglewood, CA',  group:'Group G',      sofi:true,  swiss:false, pats:['new zealand','match 15','june 15'] },
  { id:'m26', num:26, teams:'Switzerland vs Bosnia',flags:'🇨🇭🇧🇦', date:'2026-06-18', time:'3:00 PM PT', venue:'SoFi Stadium',    city:'Inglewood, CA',  group:'Group B',      sofi:true,  swiss:true,  pats:['bosnia','match 26','m26'] },
  { id:'m39', num:39, teams:'Belgium vs Iran',      flags:'🇧🇪🇮🇷', date:'2026-06-21', time:'6:00 PM PT', venue:'SoFi Stadium',    city:'Inglewood, CA',  group:'Group G',      sofi:true,  swiss:false, pats:['belgium','match 39'] },
  { id:'m51', num:51, teams:'Canada vs Switzerland',flags:'🇨🇦🇨🇭', date:'2026-06-24', time:'3:00 PM PT', venue:'BC Place Stadium',city:'Vancouver, BC',   group:'Group B',      sofi:false, swiss:true,  pats:['canada','match 51'] },
  { id:'m59', num:59, teams:'USA vs Turkey',        flags:'🇺🇸🇹🇷', date:'2026-06-25', time:'6:00 PM PT', venue:'SoFi Stadium',    city:'Inglewood, CA',  group:'Group D',      sofi:true,  swiss:false, pats:['turkey','match 59'] },
  { id:'m73', num:73, teams:'R32 (2A vs 2B)',       flags:'🏆',     date:'2026-06-28', time:'TBD',        venue:'SoFi Stadium',    city:'Inglewood, CA',  group:'Round of 32',  sofi:true,  swiss:false, pats:['match 73','2a vs'] },
  { id:'m84', num:84, teams:'R32 (1H vs 2J)',       flags:'🏆',     date:'2026-07-02', time:'TBD',        venue:'SoFi Stadium',    city:'Inglewood, CA',  group:'Round of 32',  sofi:true,  swiss:false, pats:['match 84','1h vs'] },

  { key:'Ticketmaster', label:'Ticketmaster', domain:'ticketmaster.com' },
  { key:'SeatGeek',     label:'SeatGeek',     domain:'seatgeek.com' },
  { key:'StubHub',      label:'StubHub',      domain:'stubhub.com' },

function platLogo(domain) {
  return `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function timeAgo(iso) {
  if (!iso) return '—';
  const d = (Date.now() - new Date(iso)) / 1000;
  if (d < 90)    return 'just now';
  if (d < 3600)  return `${Math.round(d/60)}m ago`;
  if (d < 86400) return `${Math.round(d/3600)}h ago`;
  return `${Math.round(d/86400)}d ago`;
}
function fmtDate(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
  } catch { return iso.slice(0,10); }
}

// ── Matching rows to games ────────────────────────────────────────────────────
function rowsForGame(allRows, game) {
  return allRows.filter(row => {
    const text = `${row.event||''} ${row.venue||''} ${row.body||''}`.toLowerCase();
    if (game.pats.some(p => text.includes(p.toLowerCase()))) return true;
    // Generic "Switzerland" reddit post that doesn't match any specific game pattern
    if (game.swiss && row.platform.toLowerCase().includes('reddit')) {
      const hasSwiss = text.includes('switzerland') || text.includes('swiss');
      if (hasSwiss) {
        const matchesOtherSwissGame = GAMES.some(g =>
          g !== game && g.swiss && g.pats.some(p => text.includes(p.toLowerCase()))
        );
        if (!matchesOtherSwissGame) return true;
      }
    }
    return false;
  });
}

// ── Extract ticket count from Reddit post text ────────────────────────────────
function extractSeatCount(title, body) {
  const text = ((title || '') + ' ' + (body || '')).toLowerCase();
  // Ordered from most specific to least specific.
  // Negative lookbehind avoids "Category 1", "Section 2", "Tier 3" false positives.
  const patterns = [
    // "selling 4 tickets", "wts 2 tickets"
    /(?:selling|wts|fs|offering)\s+(\d{1,2})\s*(?:tickets?|seats?|tix)/,
    // "have 4 tickets", "got 2 seats"
    /\b(?:have|got|own)\s+(\d{1,2})\s*(?:tickets?|seats?|tix)/,
    // "4x tickets", "2x $300"
    /\b(\d{1,2})\s*[x×]\s*(?:\$|\d|tickets?|seats?)/,
    // "4 tickets" — but NOT "category 4", "section 4", "tier 4", "row 4"
    /(?<!(?:category|section|tier|row|cat|sec)\s)(?<!\d)\b([2-9]|1[0-9]|20)\s*(?:tickets?|seats?|tix)\b/,
    // "a pair of tickets"
    /\bpair\b/,
  ];
  for (const p of patterns) {
    const m = text.match(p);
    if (m) {
      const n = m[1] ? parseInt(m[1]) : 2;
      if (n >= 1 && n <= 20) return n;
    }
  }
  return null;
}

// ── Availability badge ────────────────────────────────────────────────────────
function avBadge(row) {
  if (!row.platform.toLowerCase().includes('reddit')) return '';
  const av = row.availability || '';
  if (av === 'sold')      return '<span class="av-badge av-sold">SOLD</span>';
  if (av === 'available') return '<span class="av-badge av-available">LIVE</span>';
  return '<span class="av-badge av-uncertain">?</span>';
}

// ── SeatGeek manual prices (localStorage, since DataDome blocks all automation) ────
const LS_SG = 'wc2026_sg_v1';
function getSgPrices() {
  try { return JSON.parse(localStorage.getItem(LS_SG) || '{}'); } catch { return {}; }
}
function setSgPrice(eventKey, price) {
  const p = getSgPrices();
  p[eventKey] = { price: parseFloat(price), ts: new Date().toISOString() };
  localStorage.setItem(LS_SG, JSON.stringify(p));
}
function clearSgPrice(eventKey) {
  const p = getSgPrices();
  delete p[eventKey];
  localStorage.setItem(LS_SG, JSON.stringify(p));

}
function sgEnterPrice(btn, eventKey) {
  const wrap = btn.closest('.sg-entry-wrap');
  const input = document.createElement('input');
  input.type = 'number'; input.min = '1'; input.max = '9999'; input.step = '1';
  input.placeholder = '350'; input.className = 'sg-price-input';
  const save = document.createElement('button');
  save.className = 'sg-save-btn'; save.textContent = 'Save';
  const cancel = document.createElement('button');
  cancel.className = 'sg-cancel-btn'; cancel.textContent = '✕';
  const form = document.createElement('div');
  form.className = 'sg-entry-form';
  form.appendChild(input); form.appendChild(save); form.appendChild(cancel);
  wrap.innerHTML = '<span style="color:var(--muted);font-size:0.85rem">$</span>';

    if (!isNaN(v) && v > 0) { setSgPrice(eventKey, v); renderAll(); }
  };
  save.addEventListener('click', doSave);
  cancel.addEventListener('click', () => renderAll());
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') doSave();
    if (e.key === 'Escape') renderAll();
  });
}
function sgEditPrice(btn, eventKey) { sgEnterPrice(btn, eventKey); }

// ── Build a buy URL with sort-by-price params so the dashboard price lands at top ──
function sortedBuyUrl(r) {
  const base = r.url_qty2 || r.url;
  if (!base) return base;
  try {
    const u = new URL(base);
    const p = (r.platform || '').toLowerCase();
    const qty = r.best_qty || 1;
    if (p.includes('seatgeek')) {
      u.searchParams.set('sort', 'price');
      u.searchParams.set('quantity', String(qty));
    } else if (p.includes('stubhub')) {
      u.searchParams.set('sort', 'price asc');
      u.searchParams.set('quantity', String(qty));
    } else if (p.includes('ticketmaster')) {
      u.searchParams.set('sort', 'ticketsByPrice');
      u.searchParams.set('qty', String(qty));
    } else if (p.includes('vivid')) {
      u.searchParams.set('quantity', String(qty));
    }
    return u.toString();
  } catch { return base; }
}

// ── Render one platform row ───────────────────────────────────────────────────
function renderPlatRow(plat, rows, history) {
  // Find best (lowest current price) entry for this platform+game combination
  const matching = rows.filter(r => r.platform.startsWith(plat.key) && !r.platform.toLowerCase().includes('reddit'));
  const logo = `<img class="plat-logo" src="${platLogo(plat.domain)}" alt="${esc(plat.label)}" onerror="this.style.display='none'">`;

  if (!matching.length) {
    return `<div class="platform-row">
      ${logo}
      <span class="plat-name">${esc(plat.label)}</span>
      <div class="plat-price-wrap"><span class="plat-price monitoring">No data</span></div>
    </div>`;
  }

  const C = getCeiling();
  let html = '';
  for (const r of matching) {
    const isSeatGeek = r.platform === 'SeatGeek';

    // For SeatGeek, merge manual localStorage price with scraped price
    const sgPrices = isSeatGeek ? getSgPrices() : {};
    const sgEntry  = isSeatGeek ? sgPrices[r.event] : null;
    let price      = r.last_price != null ? r.last_price : (sgEntry ? sgEntry.price : null);
    const isManual = isSeatGeek && r.last_price == null && sgEntry != null;

    const minSeen = r.min_seen;
    const isLow  = price != null && minSeen != null && price <= minSeen;
    const isDeal = price != null && price < C;

    // Quantity context — which qty gave the best price (all platforms now report this)
    const qty = r.best_qty || null;

    // Build the price display
    let priceStr;
    if (price != null) {
      const qtyChip = (qty && !isManual)
        ? `<span class="qty-chip">×${qty} ticket${qty > 1 ? 's' : ''}</span>`
        : '';
      priceStr = `<span class="plat-price">$${Math.round(price)}</span>${qtyChip}`;
      if (isManual) {
        const ekEsc = esc(r.event).replace(/'/g, "\\'");
        priceStr += ` <button class="sg-enter-btn" style="font-size:0.62rem;padding:2px 7px" onclick="sgEditPrice(this,'${ekEsc}')">Edit</button>`;
      }
    } else if (isSeatGeek) {
      // No price yet — show inline entry UI
      const openHref = r.url ? esc(r.url) : 'https://seatgeek.com';
      const ekEsc = esc(r.event).replace(/'/g, "\\'");
      priceStr = `<div class="sg-entry-wrap">
        <button class="sg-enter-btn" onclick="sgEnterPrice(this,'${ekEsc}')">+ Enter price</button>
        <a class="sg-open-link" href="${openHref}" target="_blank" rel="noopener">open SeatGeek ↗</a>
      </div>`;
    } else {
      priceStr = `<span class="plat-price monitoring">Monitoring…</span>`;
    }

    // Build the note line
    let noteStr;
    if (isManual) {
      const ekEsc = esc(r.event).replace(/'/g, "\\'");
      noteStr = `<div class="plat-note">manual · updated ${timeAgo(sgEntry.ts)} · <button onclick="clearSgPrice('${ekEsc}')" style="background:none;border:none;color:var(--muted);font-size:inherit;cursor:pointer;padding:0;text-decoration:underline">clear</button></div>`;
    } else if (isSeatGeek && !price) {
      noteStr = `<div class="plat-note">DataDome blocks automation — enter price manually above</div>`;
    } else {
      const noteParts = [
        r.price_note || '',
        qty && qty > 1 ? `$${Math.round(price * qty)} total` : '',
        `checked ${timeAgo(r.last_checked)}`,
      ].filter(Boolean);
      noteStr = `<div class="plat-note">${noteParts.join(' · ')}</div>`;
    }

    const tags = (isLow ? '<span class="tag-low">★ NEW LOW</span>' : '') + (isDeal && !isLow ? '<span class="tag-deal">DEAL</span>' : '');
    const countStr = (() => {
      if (r.ticket_count) return `<span class="plat-count">🎟 ${Number(r.ticket_count).toLocaleString()} tickets</span>`;
      if (r.listing_count) return `<span class="plat-count">📋 ${Number(r.listing_count).toLocaleString()} listings</span>`;
      return '';
    })();
    const buyUrl = sortedBuyUrl(r);
    const link = buyUrl ? `<a class="buy" href="${esc(buyUrl)}" target="_blank" rel="noopener">View →</a>` : '';
    const eventLabel = r.event && r.event.length > 10 ? `<div style="font-size:0.68rem;color:var(--muted);margin-bottom:2px;line-height:1.3">${esc(r.event.slice(0,80))}</div>` : '';

    html += `<div class="platform-row">
      ${logo}
      <div class="plat-name">${esc(plat.label)}</div>
      <div class="plat-price-wrap">
        ${eventLabel}
        <div style="display:flex;align-items:center;gap:6px">${priceStr}<span class="plat-tags">${tags}</span></div>
        ${noteStr}
      </div>
      ${countStr}
      ${link}
    </div>`;
  }
  return html;
}

// ── Render Reddit posts ───────────────────────────────────────────────────────
function renderReddit(rows) {
  const redditRows = rows.filter(r => r.platform.toLowerCase().includes('reddit') && r.availability !== 'sold');
  const dismissed = getDismissed();

    for (const r of redditRows) {

      const isDismissed = dismissed.has(key);
      const price = r.last_price != null ? `<span class="reddit-price">$${Math.round(r.last_price)}/ticket</span>` : '';

      const link = r.url ? `<a href="${esc(r.url)}" target="_blank" rel="noopener" style="font-size:0.7rem;color:var(--accent)">Open thread →</a>` : '';
      const keyEsc = esc(key);

        : '';

        ? `<span style="font-size:0.68rem;color:var(--muted)">= $${Math.round(r.last_price * seatCount)} total</span>`
        : '';

      html += `<div class="reddit-post${isDismissed ? ' dismissed' : ''}">

// ── Render a full game card ───────────────────────────────────────────────────
function renderGameCard(game, allRows) {
  const rows = rowsForGame(allRows, game);
  const platRows = rows.filter(r => !r.platform.toLowerCase().includes('reddit'));
  const redditRows = rows.filter(r => r.platform.toLowerCase().includes('reddit'));

  // When a stat-card filter is active, narrow down to only the matching rows
  // so each game card shows just the specific platform listing(s) the user asked for.
  let displayPlatRows = platRows;
  if (activeTab.endsWith('_best')) {
    const prices = platRows.map(r => r.last_price).filter(p => p != null);
    if (prices.length) {
      const minP = Math.min(...prices);
      displayPlatRows = platRows.filter(r => r.last_price === minP);
    }
  } else if (activeTab.endsWith('_below')) {
    const C = getCeiling();
    displayPlatRows = platRows.filter(r => r.last_price != null && r.last_price < C);
  } else if (activeTab.endsWith('_lows')) {
    displayPlatRows = platRows.filter(r => r.min_seen != null && r.last_price != null && r.last_price <= r.min_seen);
  }

  const minPriced = displayPlatRows.filter(r => r.last_price != null);
  const bestPrice = minPriced.length ? Math.min(...minPriced.map(r => r.last_price)) : null;
  const C = getCeiling();
  const headerColor = bestPrice != null && bestPrice < C ? 'rgba(34,197,94,0.08)' : '';

  // Rows to pass into renderPlatRow (filtered plat rows + reddit)
  const rowsForRender = [...displayPlatRows, ...redditRows];

  let platformHtml = '';
  for (const plat of PLATFORMS) {
    // Under a stat filter: skip platforms that have no matching rows
    if (STAT_FILTERS.has(activeTab) && !displayPlatRows.some(r => r.platform.startsWith(plat.key))) continue;
    platformHtml += renderPlatRow(plat, rowsForRender, {});
  }

  // Hide Reddit section under stat filters — user wants specific price options only
  const redditHtml = STAT_FILTERS.has(activeTab) ? '' : renderReddit(rows);

  return `<div class="game-card">
    <div class="game-card-header" style="background:${headerColor||''}">
      <div class="game-flags">${game.flags}</div>
      <div class="game-info">
        <h2>
          <span class="game-badge">${esc(game.group)} · Match ${game.num}</span>
          ${esc(game.teams)}
        </h2>
        <div class="game-meta">
          📅 ${fmtDate(game.date)} · ${esc(game.time)}
          &nbsp;·&nbsp; 🏟️ ${esc(game.venue)}, ${esc(game.city)}
          ${bestPrice != null ? `&nbsp;·&nbsp; <strong style="color:var(--yellow)">From $${Math.round(bestPrice)}</strong>` : ''}
        </div>
      </div>
    </div>
    <div class="platform-section">${platformHtml}</div>
    ${redditHtml}
  </div>`;
}

// ── Render all game panels ────────────────────────────────────────────────────
let allRows = [];
let activeTab = 'all';

// Filter views: which games to show for special tabs
function _gamesWithPrice(games, pred) {
  return games.filter(g => {
    const rows = allRows.filter(r =>
      rowsForGame([r], g).length > 0 && !r.platform.toLowerCase().includes('reddit')
    );
    return rows.some(r => r.last_price != null && pred(r));
  });
}
function _gameBestPrice(games) {
  // Return the single game with the lowest current price
  let best = null, bestPrice = Infinity;
  for (const g of games) {
    const rows = allRows.filter(r =>
      rowsForGame([r], g).length > 0 && !r.platform.toLowerCase().includes('reddit')
    );
    const prices = rows.map(r => r.last_price).filter(p => p != null);
    if (prices.length) {
      const min = Math.min(...prices);
      if (min < bestPrice) { bestPrice = min; best = g; }
    }
  }
  return best ? [best] : games;
}
const FILTERS = {
  all:        () => GAMES,
  swiss:      () => GAMES.filter(g => g.swiss),
  sofi:       () => GAMES.filter(g => g.sofi),
  swiss_best: () => _gameBestPrice(GAMES.filter(g => g.swiss)),
  swiss_below:() => _gamesWithPrice(GAMES.filter(g => g.swiss), r => r.last_price < getCeiling()),
  swiss_lows: () => _gamesWithPrice(GAMES.filter(g => g.swiss), r => r.min_seen != null && r.last_price <= r.min_seen),
  sofi_best:  () => _gameBestPrice(GAMES.filter(g => g.sofi)),
  sofi_below: () => _gamesWithPrice(GAMES.filter(g => g.sofi),  r => r.last_price < getCeiling()),
  sofi_lows:  () => _gamesWithPrice(GAMES.filter(g => g.sofi),  r => r.min_seen != null && r.last_price <= r.min_seen),
};

function activeGames() {
  return (FILTERS[activeTab] || (() => GAMES.filter(g => g.id === activeTab)))();
}

function filterLabel() {
  const labels = {
    swiss_best:  'Best-priced Switzerland game',
    swiss_below: `Switzerland games below $${Math.round(getCeiling())}`,
    swiss_lows:  'Switzerland games at new lows',
    sofi_best:   'Best-priced SoFi / LA game',
    sofi_below:  `SoFi / LA games below $${Math.round(getCeiling())}`,
    sofi_lows:   'SoFi / LA games at new lows',
    swiss:       'All Switzerland games',
    sofi:        'All SoFi / LA games',
  };
  return labels[activeTab] || null;
}

function renderAll() {
  const panels = document.getElementById('game-panels');
  if (!allRows.length) return;
  const games = activeGames();
  const label = filterLabel();
  let html = `<div class="game-panel active">`;
  if (label) {
    const n = games.length;
    html += `<div class="filter-header">
      <span class="filter-header-label">${n} game${n !== 1 ? 's' : ''}</span>
      <span class="filter-header-sub">— ${label}</span>
      <button class="filter-header-clear" onclick="setTab('all')">✕ Show all</button>
    </div>`;
  }
  for (const game of games) {
    html += renderGameCard(game, allRows);
  }
  html += '</div>';
  panels.innerHTML = html;
}

// ── Build tabs ────────────────────────────────────────────────────────────────
const STAT_FILTERS = new Set(['swiss_best','swiss_below','swiss_lows','sofi_best','sofi_below','sofi_lows']);

function buildTabs() {
  const tabs = document.getElementById('gameTabs');

  function btn(g) {
    const venue = g.swiss && !g.sofi ? 'Away' : g.sofi && !g.swiss ? 'SoFi' : 'SoFi 🇨🇭';
    return `<button class="gtab${activeTab===g.id?' active':''}" onclick="setTab('${g.id}')">
      <span class="tab-flags">${g.flags}</span>
      <span class="tab-teams">${esc(g.teams)}</span>
      <span class="tab-date">${g.date.slice(5).replace('-','/').replace(/^0/,'')} · ${venue}</span>
    </button>`;
  }

  // Stat-card filters (best/below/lows): show only the matching games as tabs.
  // Group / game filters: show all games so the user can still navigate freely.
  const displayGames = STAT_FILTERS.has(activeTab) ? activeGames() : GAMES;
  const swissGames    = displayGames.filter(g => g.swiss);
  const sofiOnlyGames = displayGames.filter(g => g.sofi && !g.swiss);

  tabs.innerHTML = `
    <div class="tab-split">
      <div class="tab-split-swiss">${swissGames.map(btn).join('')}</div>
      <div class="tab-split-gap"></div>
      <div class="tab-split-sofi">${sofiOnlyGames.map(btn).join('')}</div>
    </div>`;
}

function setTab(id) {
  activeTab = id;
  buildTabs();
  renderAll();
  updateSummary();
  window.scrollTo({ top: 0 });
}

// ── Summary cards ─────────────────────────────────────────────────────────────
function updateSummary() {
  const C = getCeiling();

  function groupStats(games) {
    // Count GAMES (not listings) — so the number shown = number of game cards the filter will show
    const gameStats = games.map(g => {
        const gRows = allRows.filter(r =>
          rowsForGame([r], g).length > 0 && !r.platform.toLowerCase().includes('reddit') && r.last_price != null
        );
        return {
          minPrice: gRows.length ? Math.min(...gRows.map(r => r.last_price)) : null,
          hasBelow: gRows.some(r => r.last_price < C),
          hasLow:   gRows.some(r => r.min_seen != null && r.last_price <= r.min_seen),
        };
      });
      const pricedGames = gameStats.filter(d => d.minPrice != null);
      return {
        best:  pricedGames.length ? Math.min(...pricedGames.map(d => d.minPrice)) : null,
        below: gameStats.filter(d => d.hasBelow).length,
        lows:  gameStats.filter(d => d.hasLow).length,
      };
    }

  const swiss = groupStats(GAMES.filter(g => g.swiss));
  const sofi  = groupStats(GAMES.filter(g => g.sofi));
  const fmt   = v => v != null ? `$${Math.round(v)}` : '—';

  const swissGroup = activeTab === 'swiss' || activeTab.startsWith('swiss_');
  const sofiGroup  = activeTab === 'sofi'  || activeTab.startsWith('sofi_');
  const allActive  = activeTab === 'all';
  const swissCount = GAMES.filter(g => g.swiss).length;
  const sofiCount  = GAMES.filter(g => g.sofi).length;

  // No onclick on the group div — label is clickable for "show all", cards are individually clickable.
  // This avoids any event-bubbling conflict between the group and card handlers.
  function scard(filterId, num, label, disabled) {
    const isActive = activeTab === filterId;
    const cls = ['scard'];
    if (!disabled) cls.push('scard-btn');
    if (isActive)  cls.push('scard-active');
    const style = disabled ? 'opacity:0.35;' : '';
    const click = disabled ? '' : `onclick="setTab('${filterId}')"`;
    return `<div class="${cls.join(' ')}" style="${style}" ${click}>
      <div class="num">${num}</div><div class="lbl">${label}</div>
    </div>`;
  }

  document.getElementById('summary').innerHTML = `
    <div class="summary-group${swissGroup ? ' active-filter' : ''}">
      <div class="summary-group-label" onclick="setTab('swiss')" title="All Switzerland games">🇨🇭 Switzerland</div>
      <div class="summary-cards">
        ${scard('swiss_best',  fmt(swiss.best),  'Best price',          swiss.best == null)}
        ${scard('swiss_below', swiss.below,      'Below $'+Math.round(C), swiss.below === 0)}
        ${scard('swiss_lows',  swiss.lows,       'New lows',            swiss.lows  === 0)}
      </div>
    </div>
    <div class="summary-center">
      <button class="gtab filter-tab${swissGroup ? ' active' : ''}" onclick="setTab('swiss')">
        <span class="tab-flags">🇨🇭</span>
        <span class="tab-teams">Switzerland</span>
        <span class="tab-date">${swissCount} games</span>
      </button>
      <button class="gtab filter-tab${sofiGroup ? ' active' : ''}" onclick="setTab('sofi')">
        <span class="tab-flags">🏟️</span>
        <span class="tab-teams">SoFi / LA</span>
        <span class="tab-date">${sofiCount} games</span>
      </button>
      <button class="gtab${allActive ? ' active' : ''}" onclick="setTab('all')">
        <span class="tab-flags">⚽</span>
        <span class="tab-teams">All Games</span>
        <span class="tab-date">${GAMES.length} matches</span>
      </button>
    </div>
    <div class="summary-group summary-group-right${sofiGroup ? ' active-filter' : ''}">
      <div class="summary-group-label" onclick="setTab('sofi')" title="All SoFi / LA games">🏟️ SoFi / LA</div>
      <div class="summary-cards">
        ${scard('sofi_best',  fmt(sofi.best),  'Best price',          sofi.best == null)}
        ${scard('sofi_below', sofi.below,      'Below $'+Math.round(C), sofi.below === 0)}
        ${scard('sofi_lows',  sofi.lows,       'New lows',            sofi.lows  === 0)}
      </div>
    </div>
  `;
}

// ── Load data ─────────────────────────────────────────────────────────────────
async function load() {
  try {
    const res  = await fetch('prices.json?_=' + Date.now());
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    allRows = Object.entries(data).map(([k, v]) => ({...v, _key: k}));

    const lastCheck = [...allRows.map(r=>r.last_checked).filter(Boolean)].sort().pop();
    const plats = [...new Set(allRows.filter(r=>r.last_price!=null).map(r=>r.platform.split(' ')[0]))];
    document.getElementById('meta').textContent =
      `${plats.length} platforms · prices last fetched ${timeAgo(lastCheck)} (hourly by server) · page refreshes every 5 min`;

    document.getElementById('spinner')?.remove();
    updateSummary();
    buildTabs();
    renderAll();
  } catch(e) {
    document.getElementById('game-panels').innerHTML =
      `<div class="error-msg">Could not load prices.json — run the checker first.<br><small>${e}</small></div>`;
  }
}

// ── Trigger GitHub Actions scrape ────────────────────────────────────────────
const LS_PAT = 'wc2026_gh_pat';
const GH_DISPATCH = 'https://api.github.com/repos/nadirweibel/wc2026-tickets/actions/workflows/check.yml/dispatches';

async function triggerScrape() {
  const btn = document.getElementById('run-btn');

  // Get or prompt for PAT (needs workflow scope)
  let pat = localStorage.getItem(LS_PAT) || '';
  if (!pat) {
    pat = window.prompt(
      'Enter a GitHub personal access token with "workflow" scope.\n' +
      'It will be saved in localStorage for future use.\n\n' +
      'Create one at: github.com/settings/tokens/new → check "workflow"'
    );
    if (!pat) return;
    localStorage.setItem(LS_PAT, pat.trim());
    pat = pat.trim();
  }

  btn.textContent = '⏳ Triggering…';
  btn.disabled = true;

  try {
    const res = await fetch(GH_DISPATCH, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${pat}`,
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ ref: 'main' }),
    });

    if (res.status === 204) {
      btn.textContent = '✓ Running…';
      btn.style.borderColor = 'var(--yellow)';
      btn.style.color = 'var(--yellow)';
      // Auto-reload after ~2 min to pick up fresh prices
      setTimeout(() => {
        btn.textContent = '↻ Reloading…';
        load().then(() => {
          btn.textContent = '▶ Run now';
          btn.style.borderColor = 'var(--green)';
          btn.style.color = 'var(--green)';
          btn.disabled = false;
        });
      }, 120_000);
    } else if (res.status === 401) {
      localStorage.removeItem(LS_PAT);
      alert('Token rejected (401). It has been cleared — try again with a valid token.');
      btn.textContent = '▶ Run now';
      btn.disabled = false;
    } else {
      const body = await res.text();
      alert(`GitHub returned ${res.status}:\n${body.slice(0, 200)}`);
      btn.textContent = '▶ Run now';
      btn.disabled = false;
    }
  } catch (e) {
    alert(`Network error: ${e}`);
    btn.textContent = '▶ Run now';
    btn.disabled = false;
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
if (isAuthed()) {
  load();
} else {
  document.getElementById('auth-overlay').style.display = 'flex';
  document.getElementById('spinner').style.display = 'none';
}
setInterval(() => { if (isAuthed()) load(); }, 5 * 60 * 1000);
</script>
