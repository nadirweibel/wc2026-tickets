<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WC2026 Ticket Tracker</title>
  <style>
    :root {
      --bg: #08101f;
      --card: #0f1c33;
      --border: #1c2e4a;
      --text: #e4ecf7;
      --muted: #7a93b5;
      --accent: #1a6fbe;
      --green: #22c55e;
      --yellow: #f0b429;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    header {
      background: linear-gradient(135deg, #002b6b 0%, #001435 100%);
      padding: 22px 32px 20px;
      border-bottom: 2px solid #1a6fbe;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    }
    header h1 { font-size: 1.45rem; font-weight: 800; letter-spacing: -0.4px; }
    header h1 span { color: #ffd700; }
    .meta { font-size: 0.78rem; color: #7aaef8; margin-top: 4px; }
    .refresh-btn {
      background: rgba(26,111,190,0.25); border: 1px solid var(--accent);
      color: #7aaef8; border-radius: 6px; padding: 6px 14px; font-size: 0.78rem;
      cursor: pointer;
    }
    .refresh-btn:hover { background: var(--accent); color: #fff; }
    .ceiling-control {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 12px;
    }
    .ceiling-control label { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
    .ceiling-input {
      background: transparent; border: none; border-bottom: 1px solid var(--accent);
      color: #ffd700; font-size: 1rem; font-weight: 700; width: 64px;
      text-align: right; outline: none; padding: 0 2px;
    }
    .ceiling-input:focus { border-bottom-color: #fff; }
    .ceiling-note { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }

    .summary { display: flex; gap: 14px; padding: 18px 32px; flex-wrap: wrap; }
    .scard {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 20px; min-width: 130px;
    }
    .scard .num { font-size: 1.9rem; font-weight: 800; color: #ffd700; }
    .scard .lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-top: 3px; }

    .toolbar { padding: 0 32px 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .filter-btn {
      background: var(--card); border: 1px solid var(--border); color: var(--muted);
      border-radius: 20px; padding: 6px 14px; font-size: 0.8rem; cursor: pointer;
    }
    .filter-btn.active, .filter-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
    .search-box {
      margin-left: auto; background: var(--card); border: 1px solid var(--border);
      color: var(--text); border-radius: 20px; padding: 6px 14px; font-size: 0.8rem;
      outline: none; width: 200px;
    }
    .search-box:focus { border-color: var(--accent); }

    .table-wrap { overflow-x: auto; padding: 0 32px 48px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th {
      background: var(--card); color: var(--muted); text-transform: uppercase;
      font-size: 0.68rem; letter-spacing: 0.7px; padding: 10px 12px;
      text-align: left; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none; white-space: nowrap;
    }
    th:hover { color: var(--text); }
    th .sort-arrow { opacity: 0.4; margin-left: 3px; }
    th.active .sort-arrow { opacity: 1; color: #ffd700; }
    td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:hover td { background: rgba(26,111,190,0.07); }
    tr.is-low  td:first-child { border-left: 3px solid var(--green); }
    tr.is-deal td:first-child { border-left: 3px solid var(--yellow); }

    .plat {
      display: inline-block; padding: 2px 7px; border-radius: 4px;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.4px; white-space: nowrap;
    }
    .plat-tm     { background:#162a55; color:#6fa8ff; }
    .plat-sg     { background:#0e2e1a; color:#4ade80; }
    .plat-sh     { background:#2e1010; color:#f87171; }
    .plat-vs     { background:#2e2210; color:#fbbf24; }
    .plat-reddit { background:#2a1205; color:#fb923c; }
    .plat-fifa   { background:#101530; color:#a5b4fc; }

    .price-main { font-size: 1.05rem; font-weight: 700; }
    .price-best { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    .tag {
      display: inline-block; padding: 1px 5px; border-radius: 3px;
      font-size: 0.62rem; font-weight: 800; vertical-align: middle; margin-left: 4px;
    }
    .tag-low  { background: rgba(34,197,94,0.18);  color: var(--green); }
    .tag-deal { background: rgba(240,180,41,0.18); color: var(--yellow); }

    .ev-name { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .buy {
      display: inline-block; padding: 5px 11px; background: var(--accent);
      color: #fff; border-radius: 6px; text-decoration: none;
      font-size: 0.75rem; font-weight: 600; white-space: nowrap;
    }
    .buy:hover { background: #1d7fd4; }

    .dismiss-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 0.85rem; padding: 2px 5px; border-radius: 4px;
      opacity: 0.45; line-height: 1; margin-left: 4px; vertical-align: middle;
    }
    .dismiss-btn:hover { color: #f87171; opacity: 1; }
    tr.dismissed td { opacity: 0.28; text-decoration: line-through; }
    tr.dismissed .actions-cell { text-decoration: none !important; opacity: 1 !important; }
    .av-badge {
      display: inline-block; padding: 1px 5px; border-radius: 3px;
      font-size: 0.62rem; font-weight: 800; vertical-align: middle; margin-left: 4px;
    }
    .av-sold      { background: rgba(248,113,113,0.18); color: #f87171; }
    .av-available { background: rgba(34,197,94,0.18);   color: var(--green); }
    .av-uncertain { background: rgba(122,147,181,0.18); color: var(--muted); }

    .empty { text-align: center; padding: 60px; color: var(--muted); }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.75s linear infinite; margin: 60px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── auth overlay ── */
    #auth-overlay {
      position: fixed; inset: 0; background: rgba(8,16,31,0.97);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; backdrop-filter: blur(6px);
    }
    .auth-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px 48px; text-align: center;
      max-width: 380px; width: 90%;
    }
    .auth-box h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 6px; }
    .auth-box p  { font-size: 0.8rem; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
    .auth-input {
      width: 100%; background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 10px 14px;
      font-size: 1rem; outline: none; margin-bottom: 12px; text-align: center; letter-spacing: 2px;
    }
    .auth-input:focus { border-color: var(--accent); }
    .auth-btn {
      width: 100%; background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: 11px; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; margin-bottom: 8px;
    }
    .auth-btn:hover { background: #1d7fd4; }
    .auth-error { font-size: 0.75rem; color: #f87171; min-height: 18px; margin-top: 4px; }

    @media (max-width: 700px) {
      header, .summary, .toolbar, .table-wrap { padding-left: 14px; padding-right: 14px; }
      .search-box { width: 140px; }
      .ev-name { max-width: 160px; }
    }
  </style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-box">
    <div style="font-size:2.8rem;margin-bottom:14px">🏆⚽🇨🇭</div>
    <h2>WC2026 Ticket Tracker</h2>
    <p>Private dashboard<br>Enter password to continue</p>
    <form id="auth-form">
      <input id="auth-input" class="auth-input" type="password" placeholder="Password" autocomplete="current-password">
      <button type="submit" class="auth-btn">Enter →</button>
    </form>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<header>
  <div style="display:flex;align-items:center;gap:14px">
    <div style="font-size:2.6rem;line-height:1">🏆</div>
    <div>
      <h1>WC2026 <span>Ticket Tracker</span></h1>
      <div class="meta" id="meta">Loading…</div>
    </div>
    <div style="font-size:2rem;line-height:1;opacity:0.85">🇨🇭</div>
  </div>
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <div class="ceiling-control">
      <label for="ceilingInput">Alert ceiling</label>
      <span style="color:var(--muted);font-size:0.9rem">$</span>
      <input id="ceilingInput" class="ceiling-input" type="number" min="0" max="9999" step="25">
      <div class="ceiling-note">UI only — email uses server setting</div>
    </div>
    <button class="refresh-btn" onclick="load()">↻ Refresh</button>
  </div>
</header>

<div class="summary" id="summary"></div>

<div class="toolbar">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('swiss',this)">🇨🇭 Switzerland</button>
  <button class="filter-btn" onclick="setFilter('sofi',this)">🏟️ SoFi / LA</button>
  <button class="filter-btn" onclick="setFilter('reddit',this)">Reddit</button>
  <button class="filter-btn" onclick="setFilter('low',this)">⭐ All-time lows</button>
  <button class="filter-btn" onclick="setFilter('deal',this)">Below ceiling</button>
  <button class="filter-btn" id="dismissedBtn" onclick="toggleDismissed()" style="display:none">Show dismissed (0)</button>
  <input class="search-box" id="searchBox" placeholder="Search…" oninput="render()">
</div>

<div class="table-wrap">
  <div class="spinner" id="spinner"></div>
  <table id="tbl" style="display:none">
    <thead>
      <tr>
        <th onclick="sortBy('platform')">Platform <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('event')">Event <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('date')">Date <span class="sort-arrow">↕</span></th>
        <th>Venue</th>
        <th onclick="sortBy('last_price')" class="active">Current $ <span class="sort-arrow">↑</span></th>
        <th onclick="sortBy('min_seen')">Best Seen <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('last_checked')">Checked <span class="sort-arrow">↕</span></th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">No listings match.</div>
</div>

<script>
// ── auth gate ─────────────────────────────────────────────────────────────────
const SITE_PW = 'wc2026';        // ← change this line to set your password
const LS_AUTH = 'wc2026_auth_v1';

function isAuthed() { return localStorage.getItem(LS_AUTH) === SITE_PW; }

document.getElementById('auth-form').addEventListener('submit', e => {
  e.preventDefault();
  const pw = document.getElementById('auth-input').value;
  if (pw === SITE_PW) {
    localStorage.setItem(LS_AUTH, SITE_PW);
    document.getElementById('auth-overlay').style.display = 'none';
    load();
  } else {
    document.getElementById('auth-error').textContent = 'Wrong password — try again.';
    document.getElementById('auth-input').value = '';
    document.getElementById('auth-input').focus();
  }
});

let allRows = [];
let currentFilter = 'all';
let sortCol = 'last_price';
let sortAsc = true;

// Ceiling is editable in the UI and persisted in localStorage.
// The email alert ceiling is separate (set as a GitHub Secret).
const LS_KEY = 'wc2026_ceiling';
function getCeiling() { return parseFloat(localStorage.getItem(LS_KEY) || '300'); }
function setCeiling(v) { localStorage.setItem(LS_KEY, v); }

// Init input from localStorage
const ceilingInput = document.getElementById('ceilingInput');
ceilingInput.value = getCeiling();
ceilingInput.addEventListener('input', () => {
  const v = parseFloat(ceilingInput.value);
  if (!isNaN(v) && v >= 0) {
    setCeiling(v);
    if (allRows.length) { updateSummary(); render(); }
  }
});

function CEILING() { return getCeiling(); }

// ── dismiss / restore ────────────────────────────────────────────────────────
const LS_DISMISSED_KEY = 'wc2026_dismissed';
function getDismissed() {
  try { return new Set(JSON.parse(localStorage.getItem(LS_DISMISSED_KEY) || '[]')); }
  catch { return new Set(); }
}
function dismiss(key) {
  const s = getDismissed(); s.add(key);
  localStorage.setItem(LS_DISMISSED_KEY, JSON.stringify([...s]));
  render(); updateToolbar();
}
function restore(key) {
  const s = getDismissed(); s.delete(key);
  localStorage.setItem(LS_DISMISSED_KEY, JSON.stringify([...s]));
  render(); updateToolbar();
}
let showDismissed = false;
function toggleDismissed() {
  showDismissed = !showDismissed;
  updateToolbar(); render();
}
function updateToolbar() {
  const n = getDismissed().size;
  const btn = document.getElementById('dismissedBtn');
  if (!btn) return;
  btn.textContent = showDismissed ? `Hide dismissed (${n})` : `Show dismissed (${n})`;
  btn.style.display = n === 0 ? 'none' : '';
}

// ── availability badge (Reddit only) ─────────────────────────────────────────
function avBadge(r) {
  if (!r.platform.toLowerCase().includes('reddit')) return '';
  const av = r.availability || '';
  if (av === 'sold')      return '<span class="av-badge av-sold">SOLD</span>';
  if (av === 'available') return '<span class="av-badge av-available">LIVE</span>';
  return '<span class="av-badge av-uncertain">?</span>';
}

// ── platform badge ────────────────────────────────────────────────────────────
function platBadge(p) {
  if (p.startsWith('Ticketmaster')) return '<span class="plat plat-tm">TM</span>';
  if (p.startsWith('SeatGeek'))     return '<span class="plat plat-sg">SG</span>';
  if (p.startsWith('StubHub'))      return '<span class="plat plat-sh">SH</span>';
  if (p.startsWith('VividSeats'))   return '<span class="plat plat-vs">VS</span>';
  if (p.toLowerCase().includes('reddit')) return '<span class="plat plat-reddit">Reddit</span>';
  if (p.startsWith('FIFA'))         return '<span class="plat plat-fifa">FIFA</span>';
  return `<span class="plat plat-tm">${esc(p.slice(0,6))}</span>`;
}

// ── helpers ───────────────────────────────────────────────────────────────────
function timeAgo(iso) {
  if (!iso) return '—';
  const d = (Date.now() - new Date(iso)) / 1000;
  if (d < 90)    return 'just now';
  if (d < 3600)  return `${Math.round(d/60)}m ago`;
  if (d < 86400) return `${Math.round(d/3600)}h ago`;
  return `${Math.round(d/86400)}d ago`;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function matchText(row, q) {
  const haystack = `${row.event} ${row.platform} ${row.venue} ${row.date}`.toLowerCase();
  return haystack.includes(q);
}
function matchFilter(row, f) {
  const ev = (row.event||'').toLowerCase();
  const pl = (row.platform||'').toLowerCase();
  const ve = (row.venue||'').toLowerCase();
  if (f==='all')    return true;
  if (f==='swiss')  return ev.includes('switzerland') || ev.includes('swiss');
  if (f==='sofi')   return ve.includes('sofi')||ve.includes('inglewood')||ev.includes('sofi')||ev.includes('inglewood')||ve.includes('los angeles');
  if (f==='reddit') return pl.includes('reddit');
  if (f==='low')    return row.last_price!=null && row.min_seen!=null && row.last_price<=row.min_seen;
  if (f==='deal')   return row.last_price!=null && row.last_price<CEILING();
  return true;
}

// ── render ────────────────────────────────────────────────────────────────────
function render() {
  const q = document.getElementById('searchBox').value.toLowerCase().trim();
  const dismissed = getDismissed();
  let visible = allRows.filter(r => {
    if (dismissed.has(r._key) && !showDismissed) return false;
    return matchFilter(r, currentFilter) && (!q || matchText(r, q));
  });
  visible.sort((a,b) => {
    let va = a[sortCol]??'', vb = b[sortCol]??'';
    if (typeof va==='string') va=va.toLowerCase();
    if (typeof vb==='string') vb=vb.toLowerCase();
    return sortAsc ? (va<vb?-1:va>vb?1:0) : (va>vb?-1:va<vb?1:0);
  });

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  if (!visible.length) {
    document.getElementById('tbl').style.display='none';
    document.getElementById('empty').style.display='';
    return;
  }
  document.getElementById('tbl').style.display='';
  document.getElementById('empty').style.display='none';

  for (const r of visible) {
    const isDismissed = dismissed.has(r._key);
    const isLow  = !isDismissed && r.last_price!=null && r.min_seen!=null && r.last_price<=r.min_seen;
    const isDeal = !isDismissed && r.last_price!=null && r.last_price<CEILING();
    const cls = [isDismissed?'dismissed':'', isLow?'is-low':'', isDeal&&!isLow?'is-deal':''].filter(Boolean).join(' ');
    const tags = (isLow ? '<span class="tag tag-low">★ LOW</span>' : '') +
                 (isDeal&&!isLow ? '<span class="tag tag-deal">DEAL</span>' : '');
    const av       = avBadge(r);
    const isMonitoring = r.last_price==null && !r.platform.toLowerCase().includes('reddit');
    const curStr   = r.last_price!=null
      ? `$${Math.round(r.last_price)}`
      : isMonitoring
        ? '<span style="font-size:0.7rem;color:var(--muted);font-style:italic">Monitoring…</span>'
        : '—';
    const bestStr  = r.min_seen!=null   ? `$${Math.round(r.min_seen)} best` : '';
    const minStr   = r.min_seen!=null   ? `$${Math.round(r.min_seen)}` : '—';
    const date     = (r.date||'').slice(0,10) || '—';
    const link     = r.url ? `<a class="buy" href="${esc(r.url)}" target="_blank" rel="noopener">View →</a>` : '';
    const keyEsc   = esc(r._key||'');
    const actionBtn = isDismissed
      ? `<button class="dismiss-btn" title="Restore listing" onclick="restore('${keyEsc}')">↩</button>`
      : `<button class="dismiss-btn" title="Mark unavailable / dismiss" onclick="dismiss('${keyEsc}')">✕</button>`;

    tbody.insertAdjacentHTML('beforeend', `
      <tr class="${cls}">
        <td>${platBadge(r.platform)}</td>
        <td><div class="ev-name" title="${esc(r.event||'')}">
          ${esc((r.event||'—').slice(0,90))}${tags}${av}
        </div></td>
        <td style="white-space:nowrap;color:var(--muted)">${date}</td>
        <td style="color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.venue||'—')}</td>
        <td>
          <div class="price-main">${curStr}</div>
          <div class="price-best">${bestStr}</div>
        </td>
        <td style="color:var(--muted)">${minStr}</td>
        <td style="color:var(--muted);white-space:nowrap">${timeAgo(r.last_checked)}</td>
        <td class="actions-cell" style="white-space:nowrap">${link}${actionBtn}</td>
      </tr>`);
  }
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function sortBy(col) {
  // Update header arrows
  document.querySelectorAll('th').forEach(th => {
    th.classList.remove('active');
    const arr = th.querySelector('.sort-arrow');
    if (arr) arr.textContent='↕';
  });
  const idx = ['platform','event','date','','last_price','min_seen','last_checked'].indexOf(col);
  const ths = document.querySelectorAll('th');
  if (idx>=0 && ths[idx]) {
    ths[idx].classList.add('active');
    ths[idx].querySelector('.sort-arrow').textContent = (sortAsc&&sortCol===col)?'↓':'↑';
  }
  if (sortCol===col) sortAsc=!sortAsc;
  else { sortCol=col; sortAsc=(col==='last_price'||col==='min_seen'); }
  render();
}

// ── summary cards (ceiling-aware, called on load and on ceiling change) ───────
function updateSummary() {
  const c = CEILING();
  const belowCeiling = allRows.filter(r=>r.last_price!=null&&r.last_price<c).length;
  const lows         = allRows.filter(r=>r.last_price!=null&&r.min_seen!=null&&r.last_price<=r.min_seen).length;
  const platforms    = [...new Set(allRows.map(r=>r.platform.split(' ')[0]))];
  document.getElementById('summary').innerHTML = `
    <div class="scard"><div class="num">${allRows.length}</div><div class="lbl">Listings tracked</div></div>
    <div class="scard"><div class="num">${belowCeiling}</div><div class="lbl">Below $${Math.round(c)} ceiling</div></div>
    <div class="scard"><div class="num">${lows}</div><div class="lbl">All-time lows now</div></div>
    <div class="scard"><div class="num">${platforms.length}</div><div class="lbl">Platforms</div></div>
  `;
}

// ── load data ─────────────────────────────────────────────────────────────────
async function load() {
  try {
    const res = await fetch('prices.json?_='+Date.now());
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    allRows = Object.entries(data).map(([k,v]) => ({...v, _key: k}));

    document.getElementById('spinner').style.display='none';

    const lastCheck = [...allRows.map(r=>r.last_checked).filter(Boolean)].sort().pop();
    const platforms = [...new Set(allRows.map(r=>r.platform.split(' ')[0]))];

    document.getElementById('meta').textContent =
      `${platforms.length} platforms · last check ${timeAgo(lastCheck)} · auto-refreshes every 5 min`;

    updateSummary();
    updateToolbar();
    render();
  } catch(e) {
    document.getElementById('spinner').outerHTML =
      `<p style="text-align:center;color:#f87171;padding:60px">
        Could not load prices.json — run the checker first, or check the repo path.<br>
        <small>${e}</small></p>`;
  }
}

// Boot: show auth overlay or load data
if (isAuthed()) {
  load();
} else {
  document.getElementById('auth-overlay').style.display = 'flex';
  document.getElementById('spinner').style.display = 'none';
}
setInterval(() => { if (isAuthed()) load(); }, 5*60*1000);
</script>
</body>
